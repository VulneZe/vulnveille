# Configuration Nginx pour FreshRSS
# Reverse proxy vers http://127.0.0.1:8081

server {
    listen 80;
    server_name freshrss.veille.local;

    # Headers de sécurité
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pour HTTPS (commenté par défaut)
    # listen 443 ssl http2;
    # ssl_certificate /etc/ssl/certs/veille.local.crt;
    # ssl_certificate_key /etc/ssl/private/veille.local.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Logs
    access_log /var/log/nginx/freshrss_access.log;
    error_log /var/log/nginx/freshrss_error.log;

    # Reverse proxy
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Limite la taille des uploads
    client_max_body_size 10M;
}
