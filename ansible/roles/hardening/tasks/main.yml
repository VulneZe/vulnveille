---
# Tâches du rôle hardening : durcissement de sécurité du système

- name: Désactiver le login root SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
  notify: restart ssh

- name: Désactiver l'authentification par mot de passe SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: restart ssh

# Règles UFW de base
- name: Installer UFW si non présent
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Configurer UFW - politique par défaut
  ansible.builtin.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Autoriser SSH
  ansible.builtin.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Autoriser HTTP et HTTPS
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '80'
    - '443'

- name: Activer UFW
  ansible.builtin.ufw:
    state: enabled

# Règles agressives (commentées par défaut pour éviter de casser l'accès)
# - name: Limiter SSH à des IP spécifiques
#   ansible.builtin.ufw:
