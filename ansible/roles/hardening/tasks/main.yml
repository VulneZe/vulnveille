# - name: Limiter HTTP/HTTPS à des IP spécifiques
#   ansible.builtin.ufw:
#     rule: allow
#     port: "{{ item.port }}"
#     proto: tcp
#     from_ip: "{{ item.ip }}"
#   loop:
#     - { port: '80', ip: '192.168.1.0/24' }
#     - { port: '443', ip: '192.168.1.0/24' }

handlers:
  - name: restart ssh
    ansible.builtin.systemd:
      name: ssh
      state: restarted
