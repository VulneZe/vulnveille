---
# Tâches du rôle docker : installation de Docker et Docker Compose

- name: Ajouter la clé GPG Docker
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    state: present

- name: Ajouter le repository Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Mettre à jour le cache apt après ajout du repository
  ansible.builtin.apt:
    update_cache: yes

- name: Installer Docker et Docker Compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Activer et démarrer le service Docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

- name: Ajouter l'utilisateur veille au groupe docker
  ansible.builtin.user:
    name: "{{ service_user }}"
    groups: docker
    append: yes

- name: Vérifier l'installation de Docker
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Afficher la version de Docker
  ansible.builtin.debug:
    var: docker_version.stdout

- name: Vérifier l'installation de Docker Compose
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Afficher la version de Docker Compose
  ansible.builtin.debug:
    var: docker_compose_version.stdout
